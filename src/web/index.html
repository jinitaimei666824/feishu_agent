<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞书 AI Agent 报告生成 GUI</title>
    <link rel="stylesheet" href="/ui.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">飞书 Agent 报告工作台</div>
      <div id="status" class="status">待命</div>
    </header>
    <main class="layout">
      <aside class="panel sidebar">
        <h3>请求配置</h3>
        <form id="report-form">
          <label>用户 ID<input id="userId" name="userId" value="u_001" required /></label>
          <label>会话 ID<input id="sessionId" name="sessionId" value="s_001" required /></label>
          <label>行业<input id="industry" name="industry" placeholder="医疗 / 财经 / 新闻 / 体育" /></label>
          <label>报告类型<input id="reportType" name="reportType" placeholder="周报 / 日报 / 分析报告" /></label>
          <label>
            需求描述
            <textarea id="prompt" name="prompt" rows="4" required placeholder="在飞书中发起需求，描述你的目标。"></textarea>
          </label>
          <label>
            额外上下文（每行一条）
            <textarea id="extraContext" name="extraContext" rows="3"></textarea>
          </label>
          <label>
            个人知识库（每行一条）
            <textarea id="personalKnowledge" name="personalKnowledge" rows="4" placeholder="例如：用户习惯、术语偏好、写作风格"></textarea>
          </label>
          <label>
            历史文档摘要（每行一条）
            <textarea id="historyDocs" name="historyDocs" rows="4" placeholder="例如：上周报告重点、复盘结论"></textarea>
          </label>
          <label>
            IM 联系人（每行：id,name,role）
            <textarea id="imContacts" name="imContacts" rows="4" placeholder="u_alice,Alice,项目经理"></textarea>
          </label>
          <div class="actions">
            <button id="submit-btn" type="submit">生成结构化报告</button>
            <button id="docx-btn" type="button" class="secondary">导出 Word 报告</button>
          </div>
        </form>
      </aside>

      <section class="panel main">
        <h3>Agent 执行流</h3>
        <ol id="flow" class="flow">
          <li>Intent Agent 识别任务类型</li>
          <li>Skill 选择 + 记忆读取</li>
          <li>Planner 生成计划</li>
          <li>Retriever 聚合飞书上下文</li>
          <li>Analyst 统一口径并推荐图表</li>
          <li>Writer 生成初稿</li>
          <li>Reviewer 规范审阅</li>
          <li>输出到文档 / 表格 / 幻灯片（占位）</li>
        </ol>

        <h3>追问与协作（IM 占位）</h3>
        <pre id="followup" class="box">暂无追问</pre>

        <h3>生成结果（JSON）</h3>
        <pre id="result" class="box">等待请求...</pre>
      </section>
    </main>

    <script src="/ui.js"></script>
    <!-- 飞书网页应用「桌面端内嵌标签页」远程调试（需发布后在飞书内打开页面生效） -->
    <script src="https://lf-package-cn.feishucdn.com/obj/feishu-static/op/fe/devtools_frontend/remote-debug-0.0.1-alpha.6.js"></script>
  </body>
  </html>
